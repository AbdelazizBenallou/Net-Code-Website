  <rect x="186" y="318" width="12" height="12" rx="2" fill="#334155"/>
  <rect x="202" y="318" width="12" height="12" rx="2" fill="#334155"/>
  <rect x="218" y="318" width="12" height="12" rx="2" fill="#334155"/>
  <rect x="234" y="318" width="12" height="12" rx="2" fill="#334155"/>
  <rect x="250" y="318" width="12" height="12" rx="2" fill="#334155"/>
  <rect x="266" y="318" width="12" height="12" rx="2" fill="#334155"/>
