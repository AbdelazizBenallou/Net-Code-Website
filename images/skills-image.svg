<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" rx="20" fill="url(#bg)"/>
  <!-- Central node -->
  <circle cx="250" cy="250" r="60" fill="#2563eb" opacity="0.15"/>
  <circle cx="250" cy="250" r="45" fill="#2563eb" opacity="0.25"/>
  <circle cx="250" cy="250" r="30" fill="#2563eb"/>
  <text x="250" y="246" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold" font-family="sans-serif">NET</text>
  <text x="250" y="260" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold" font-family="sans-serif">CODE</text>
  <!-- Connected nodes -->
  <circle cx="250" cy="110" r="30" fill="#10b981" opacity="0.9"/>
  <text x="250" y="115" font-size="9" fill="#fff" text-anchor="middle" font-family="sans-serif">Web</text>
  <line x1="250" y1="140" x2="250" y2="200" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  <circle cx="390" cy="160" r="30" fill="#f59e0b" opacity="0.9"/>
  <text x="390" y="165" font-size="9" fill="#fff" text-anchor="middle" font-family="sans-serif">Mobile</text>
  <line x1="283" y1="238" x2="363" y2="178" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <circle cx="110" cy="160" r="30" fill="#3b82f6" opacity="0.9"/>
  <text x="110" y="165" font-size="9" fill="#fff" text-anchor="middle" font-family="sans-serif">UI/UX</text>
  <line x1="217" y1="238" x2="137" y2="178" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <circle cx="390" cy="340" r="30" fill="#8b5cf6" opacity="0.9"/>
  <text x="390" y="345" font-size="9" fill="#fff" text-anchor="middle" font-family="sans-serif">API</text>
  <line x1="283" y1="262" x2="363" y2="322" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
  <circle cx="110" cy="340" r="30" fill="#ef4444" opacity="0.9"/>
  <text x="110" y="345" font-size="9" fill="#fff" text-anchor="middle" font-family="sans-serif">UML</text>
  <line x1="217" y1="262" x2="137" y2="322" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <circle cx="250" cy="400" r="30" fill="#06b6d4" opacity="0.9"/>
  <text x="250" y="405" font-size="9" fill="#fff" text-anchor="middle" font-family="sans-serif">Cloud</text>
  <line x1="250" y1="370" x2="250" y2="290" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <!-- Floating code brackets -->
  <text x="160" y="100" font-size="20" fill="#2563eb" opacity="0.3" font-family="monospace">&lt;/&gt;</text>
  <text x="350" y="420" font-size="16" fill="#10b981" opacity="0.3" font-family="monospace">{ }</text>
  <text x="380" y="80" font-size="14" fill="#f59e0b" opacity="0.2" font-family="monospace">()</text>
  <text x="100" y="420" font-size="18" fill="#3b82f6" opacity="0.2" font-family="monospace">[]</text>
  <!-- Dotted connections -->
  <circle cx="250" cy="110" r="2" fill="#10b981"/>
  <circle cx="390" cy="160" r="2" fill="#f59e0b"/>
  <circle cx="110" cy="160" r="2" fill="#3b82f6"/>
  <circle cx="390" cy="340" r="2" fill="#8b5cf6"/>
  <circle cx="110" cy="340" r="2" fill="#ef4444"/>
  <circle cx="250" cy="400" r="2" fill="#06b6d4"/>
  <!-- Small floating particles -->
  <circle cx="50" cy="50" r="3" fill="#2563eb" opacity="0.3"/>
  <circle cx="450" cy="50" r="4" fill="#10b981" opacity="0.2"/>
  <circle cx="50" cy="450" r="3" fill="#f59e0b" opacity="0.3"/>
  <circle cx="450" cy="450" r="4" fill="#3b82f6" opacity="0.2"/>
  <!-- Code lines decoration -->
  <rect x="40" y="200" width="30" height="3" rx="1.5" fill="#2563eb" opacity="0.15"/>
  <rect x="40" y="210" width="20" height="3" rx="1.5" fill="#10b981" opacity="0.15"/>
  <rect x="40" y="220" width="25" height="3" rx="1.5" fill="#f59e0b" opacity="0.15"/>
  <rect x="430" y="200" width="30" height="3" rx="1.5" fill="#2563eb" opacity="0.15"/>
  <rect x="430" y="210" width="20" height="3" rx="1.5" fill="#10b981" opacity="0.15"/>
  <rect x="430" y="220" width="25" height="3" rx="1.5" fill="#f59e0b" opacity="0.15"/>
</svg>